# tcli configuration for publishing to Thunderstore. The `[package]` block
# overlaps with manifest.json (inside the zip), which is generated by
# ThunderPipe.Sdk from the csproj. Both must stay in sync; release.sh
# bumps versionNumber here alongside <Version> in the csproj each release.
#
# The `[publish]` block is tcli-only -- ThunderPipe doesn't model
# communities or per-community categories, so this file is the source of
# truth for the upload target.

[config]
schemaVersion = "0.0.1"

[package]
namespace = "SisyphusMD"
name = "GhostSpectator"
versionNumber = "0.1.1"
description = "Spawn as a permanent ghost, never alive, never revived. Spectate, switch between live players, and talk on voice exactly like a vanilla PEAK ghost."
websiteUrl = "https://forgejo.bryantserver.com/SisyphusMD/GhostSpectator"
containsNsfwContent = false

[package.dependencies]
# renovate: datasource=custom.thunderstore depName=BepInEx/BepInExPack_PEAK
BepInEx-BepInExPack_PEAK = "5.4.75301"

# tcli's build block; unused when publishing with --file (zip is prebuilt
# by ThunderPipe.Sdk during dotnet build). Required to be present though.
[build]
icon = "./icon.png"
readme = "./README.md"
outdir = "./artifacts/thunderstore/tcli"

[publish]
repository = "https://thunderstore.io"
communities = ["peak"]

[publish.categories]
peak = ["mods"]
